<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Projects</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 10% 20%, rgba(96,165,250,0.18), transparent 24%),
        radial-gradient(circle at 90% 10%, rgba(37,99,235,0.12), transparent 18%),
        linear-gradient(180deg, #f7fbff 0%, #eef5ff 50%, #e6f0ff 100%);
      color: #111827;
      min-height: 100vh;
    }

    .container {
      width: min(1150px, 92%);
      margin: 0 auto;
      padding: 40px 0;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 36px;
      color: #0f172a;
    }

    p.lead {
      color: #4b5563;
      margin: 0 0 28px;
      line-height: 1.7;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(37,99,235,0.12);
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 24px;
    }

    .card {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(37,99,235,0.12);
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(37,99,235,0.12);
    }

    .card img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      display: block;
    }

    .card-content {
      padding: 18px;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(37,99,235,0.1);
      color: #1d4ed8;
      border: 1px solid rgba(37,99,235,0.1);
      margin-bottom: 10px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 22px;
      color: #0f172a;
    }

    .card p {
      color: #374151;
      line-height: 1.7;
      font-size: 14px;
    }

    .outcome {
      margin-top: 16px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(37,99,235,0.08);
      border: 1px solid rgba(37,99,235,0.12);
      color: #1f2937;
      font-size: 14px;
      line-height: 1.6;
    }

    .card-links {
      margin-top: 16px;
    }

    .card-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      background: rgba(255,255,255,0.8);
      color: #1f2937;
      border: 1px solid rgba(37,99,235,0.12);
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="btn" href="index.html">← Back to Portfolio</a>
    <h1>All Projects</h1>
    <p class="lead">Explore all AI + Networking projects from my portfolio.</p>

    <div class="grid" id="allProjectsGrid"></div>
  </div>

  <script>
    let projects = [];

    fetch('projects.json')
      .then(response => response.json())
      .then(data => {
        projects = data;
        renderProjects();
      });

    function renderProjects() {
      const grid = document.getElementById('allProjectsGrid');
      grid.innerHTML = '';

      projects.forEach(project => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <img src="${project.image}" alt="${project.title}" />
          <div class="card-content">
            <div class="badge">${project.category}</div>
            <h3>${project.title}</h3>
            <p>${project.description}</p>
            <div class="outcome"><strong>Outcome:</strong> ${project.outcome}</div>
            <div class="card-links">
              <a href="project.html?id=${project.id}">View Details</a>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }
  </script>
</body>
</html>
