<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI + Networking</title>
</head>
<body>
<!-- Trimmed for brevity: using your original file but only renderBlogs changed -->

<div id="blogList"></div>

<script>
let blogs = [];

fetch('blogs.json')
  .then(res => res.json())
  .then(data => {
    blogs = data;
    renderBlogs();
  });

function renderBlogs(limit = 3) {
  const list = document.getElementById('blogList');
  list.innerHTML = '';

  const blogsToShow = blogs.slice(0, limit);

  blogsToShow.forEach((blog, index) => {
    const post = document.createElement('div');

    post.innerHTML = `
      <h3>${blog.title}</h3>
      <p>${blog.summary}</p>
      <a href="blog-details.html?id=${index}">View Details</a>
      <hr>
    `;

    list.appendChild(post);
  });

  list.innerHTML += `
    <div style="text-align:center;">
      <a href="all-blogs.html">View More Blogs</a>
    </div>
  `;
}
</script>

</body>
</html>
