<!DOCTYPE html>
<html>
<head>
  <title>Blog Details</title>
</head>
<body>

<div id="blogDetails"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  fetch('blogs.json')
    .then(res => res.json())
    .then(data => {
      const blog = data[id];

      document.getElementById("blogDetails").innerHTML = `
        <h1>${blog.title}</h1>
        <p><strong>${blog.type}</strong></p>
        <p>${blog.summary}</p>
        <hr>
        <p>${blog.content.replace(/\\n/g, "<br>")}</p>

        <br><br>
        <a href="index.html">⬅ Back</a>
      `;
    });
</script>

</body>
</html>
